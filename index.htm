<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shyama Handpicked Bill Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;770&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Shyama Handpicked Bill Generator</h1>

        <div id="product-catalogue" class="card-grid"></div>

        <!-- NEW: Customer Details Section -->
        <div class="customer-details card">
            <h2>Customer Details</h2>
            <div class="details-grid">
                <input type="text" id="customerName" placeholder="Full Name (Required for Bill No.)">
                <input type="tel" id="customerPhone" placeholder="Phone Number">
                <textarea id="customerAddress" placeholder="Shipping Address" rows="3"></textarea>
                <textarea id="customerNotes" placeholder="Additional Notes..." rows="3"></textarea>
            </div>
        </div>

        <div class="bill-summary card">
            <h2>Bill Summary</h2>
            <div id="bill-items"></div>
            <p class="total">Total: ₹<span id="total-price">0</span></p>
            <div class="bill-actions">
                <button id="clear-selection" class="button button-secondary">Clear Selection</button>
                <button id="download-bill" class="button">Download Bill as PDF</button>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
